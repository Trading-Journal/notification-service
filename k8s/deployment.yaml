apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: prod
  labels:
    app: notification-service
    team: platform
    version: "1.0.0"
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        team: platform
        version: "1.0.0"
        environment: prod
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notification-service
          image: ghcr.io/Trading-Journal/notification-service:1.0.0
          ports:
            - containerPort: 8093
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/live
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/ready
              port: 8093
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            failureThreshold: 30
            periodSeconds: 10
